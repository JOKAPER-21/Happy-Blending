
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOKAPER | Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
      z-index: 50;
    }
    .modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 1rem;
    }
    .modal.open {
      display: flex;
    }
  </style>
</head>
<body class="bg-gray-950 text-white font-sans">

  <!-- Navigation -->
  <nav class="bg-gray-900 p-4">
    <div class="max-w-[1170px] mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold"><a href="index.html" class="text-blue-500 hover:underline">JOKAPER</a></h1>
      <a href="index.html" class="text-blue-500 hover:underline">Home</a>
    </div>
  </nav>

  <!-- Gallery Section -->
  <section id="gallery" class="py-20 px-4">
    <div class="max-w-[1170px] mx-auto">
      <h2 class="text-4xl font-bold text-center mb-2">My Gallery</h2>
      <p class="text-center text-gray-400 mb-12">Happy Blending!</p>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

      <!-- Image Card 1 -->
      <div class="relative rounded-lg shadow-md cursor-pointer overflow-hidden group" onclick="openModal(this)">
        <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/Die%20Baby.png" alt="3D Art 1" class="w-full h-full object-cover transition duration-300 group-hover:scale-105" />
        <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent p-4">
          <h3 class="text-white text-lg font-semibold">Peacefull Grave</h3>
          <p class="text-sm text-gray-300">September 13, 2024</p>
        </div>
      </div>
      
      <!-- Image Card 2 -->
      <div class="relative rounded-lg shadow-md cursor-pointer overflow-hidden group" onclick="openModal(this)">
        <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/Donut.png" alt="3D Art 2" class="w-full h-full object-cover transition duration-300 group-hover:scale-105" />
        <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent p-4">
          <h3 class="text-white text-lg font-semibold">Leave Me Alone</h3>
          <p class="text-sm text-gray-300">December 27, 2024</p>
        </div>
      </div>
      
      <!-- Image Card 3 -->
      <div class="relative rounded-lg shadow-md cursor-pointer overflow-hidden group" onclick="openModal(this)">
        <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/Is%20it%20in%20the%20dustbin.png" alt="3D Art 3" class="w-full h-full object-cover transition duration-300 group-hover:scale-105" />
        <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent p-4">
          <h3 class="text-white text-lg font-semibold">Is it in the Dustbin?</h3>
          <p class="text-sm text-gray-300">March 12, 2025</p>
        </div>
      </div>
      
      <!-- Image Card 4 -->
      <div class="relative rounded-lg shadow-md cursor-pointer overflow-hidden group" onclick="openModal(this)">
        <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/Peace.png" alt="3D Art 4" class="w-full h-full object-cover transition duration-300 group-hover:scale-105" />
        <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent p-4">
          <h3 class="text-white text-lg font-semibold">Mini Airport</h3>
          <p class="text-sm text-gray-300">December 02, 2024</p>
        </div>
      </div>
      
      <!-- Image Card 5 -->
      <div class="relative rounded-lg shadow-md cursor-pointer overflow-hidden group" onclick="openModal(this)">
        <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/Still%20Wanna%20Be%20Yours.png" alt="3D Art 5" class="w-full h-full object-cover transition duration-300 group-hover:scale-105" />
        <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent p-4">
          <h3 class="text-white text-lg font-semibold">Still Wanna Be Yours</h3>
          <p class="text-sm text-gray-300">March 01, 2025</p>
        </div>
      </div>
      
      <!-- Image Card 6 -->
      <div class="relative rounded-lg shadow-md cursor-pointer overflow-hidden group" onclick="openModal(this)">
        <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/I%20Got%20You%20Angel.png" alt="3D Art 6" class="w-full h-full object-cover transition duration-300 group-hover:scale-105" />
        <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent p-4">
          <h3 class="text-white text-lg font-semibold">I Got You Angel</h3>
          <p class="text-sm text-gray-300">April 04, 2025</p>
        </div>
      </div>


      </div>
    </div>
  </section>

  <!-- Modal for fullscreen image -->
  <div id="imgModal" class="modal" onclick="closeModal()">
    <img id="modalImg" src="" alt="Fullscreen Image" />
  </div>

  <!-- Footer -->
  <footer class="text-center text-gray-500 py-6">
    &copy; 2025 JOKAPER. All rights reserved.
  </footer>

  <script>
    const modal = document.getElementById('imgModal');
    const modalImg = document.getElementById('modalImg');
  
    function openModal(container) {
      const img = container.querySelector('img');
      modal.classList.add('open');
      modalImg.src = img.src;
    }
  
    function closeModal() {
      modal.classList.remove('open');
      modalImg.src = '';
    }
  </script>


</body>
</html>
