           data-images="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/src/images/hulk/Hulk_01.png,https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/src/images/hulk/Hulk_02.png,https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/src/images/hulk/Hulk_03.png,https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/src/images/hulk/Hulk_04.png,https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/src/images/hulk/Hulk_05.png">
        <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/src/images/hulk/Hulk_01.png" alt="Hulk"

      <!-- Leave Me Alone Card -->

  <!-- Modal -->
  <div id="imgModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden flex-col">
    <button onclick="closeModal()" class="absolute top-4 right-4 text-white text-3xl font-bold">&times;</button>
    <div class="w-full max-w-4xl px-4 flex flex-col items-center">
      <img id="modalImg" class="max-h-[80vh] max-w-full object-contain rounded-lg shadow-lg" src="" alt="Preview" />
      <div id="thumbnailStrip" class="mt-6 flex gap-3 justify-center flex-wrap"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center text-gray-500 py-6">
    &copy; 2025 JOKAPER. All rights reserved.
  </footer>

<script>
  const modal = document.getElementById('imgModal');
  const modalImg = document.getElementById('modalImg');
  const thumbnailStrip = document.getElementById('thumbnailStrip');

  let currentImages = [];
  let currentImageIndex = 0;

  function openModal(container) {
    const images = container.getAttribute('data-images');
    if (!images) return;

    currentImages = images.split(',');
    currentImageIndex = 0;
    showImage(currentImageIndex);
    renderThumbnails();

    modal.classList.remove('hidden');
    document.body.classList.add('modal-open');
  }

  function closeModal() {
    modal.classList.add('hidden');
    document.body.classList.remove('modal-open');
    modalImg.src = '';
    currentImages = [];
    currentImageIndex = 0;
    thumbnailStrip.innerHTML = '';
  }

  function showImage(index) {
    if (!currentImages.length) return;
    currentImageIndex = index;
    modalImg.src = currentImages[index].trim();

    const thumbs = thumbnailStrip.querySelectorAll('img');
    thumbs.forEach((img, i) => {
      img.classList.toggle('ring-4', i === index);
      img.classList.toggle('ring-blue-500', i === index);
    });
  }

  function renderThumbnails() {
    thumbnailStrip.innerHTML = '';
    currentImages.forEach((src, i) => {
      const img = document.createElement('img');
      img.src = src.trim();
      img.className = "w-16 h-16 object-cover rounded-md cursor-pointer transition hover:scale-105";
      img.onclick = () => showImage(i);
      thumbnailStrip.appendChild(img);
    });
  }

  function showNextImage() {
    if (currentImageIndex < currentImages.length - 1) {
      showImage(currentImageIndex + 1);
    }
  }

  function showPrevImage() {
    if (currentImageIndex > 0) {
      showImage(currentImageIndex - 1);
    }
  }

  // ✅ Keyboard Shortcut Handling (Outside any function)
  document.addEventListener('keydown', (event) => {
    if (modal.classList.contains('hidden')) return;

    switch (event.key) {
      case 'ArrowRight':
        showNextImage();
        break;
      case 'ArrowLeft':
        showPrevImage();
        break;
      case 'Escape':
      case 'Backspace':
        closeModal();
        break;
    }
  });
</script>


</body>
</html>
