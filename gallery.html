<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOKAPER | Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
      z-index: 50;
    }

    .modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 1rem;
    }

    .modal.open {
      display: flex;
    }

    /* Background blur effect */
    .blurred {
      filter: blur(5px);
    }
  </style>
</head>
<body class="bg-gray-950 text-white font-sans">

<!-- Navigation -->
<nav class="bg-gray-900">
  <div class="max-w-[1170px] mx-auto flex justify-between items-center p-4">
    <a href="index.html" class="text-2xl font-bold text-blue-500 hover:text-white transition">JOKAPER</a>
    <div class="space-x-6 text-sm sm:text-base">
      <a href="index.html" class="text-gray-300 hover:text-white transition">HOME</a>
      <a href="gallery.html" class="text-gray-300 hover:text-white transition">GALLERY</a>
      <a href="contact.html" class="text-gray-300 hover:text-white transition">CONTACT</a>
    </div>
  </div>
</nav>

<!-- Gallery Section -->
<section id="gallery" class="py-20 px-4">
  <div class="max-w-[1170px] mx-auto">
    <h2 class="text-4xl font-bold text-center mb-2">My Gallery</h2>
    <p class="text-center text-gray-400 mb-12">Happy Blending!</p>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      
      <!-- Image 1 -->
      <div class="relative group rounded-lg overflow-hidden shadow-md cursor-pointer">
        <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/Die Baby.png" alt="3D Art 1" class="w-full h-full object-cover" />
        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/40 to-transparent p-4 flex flex-col justify-end">
          <h3 class="text-white text-lg font-semibold">Die Baby</h3>
          <p class="text-sm text-gray-300">April 10, 2025</p>
        </div>
      </div>

      <!-- Image 2 -->
      <div class="relative group rounded-lg overflow-hidden shadow-md cursor-pointer">
        <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image//Donut.png" alt="3D Art 2" class="w-full h-full object-cover" />
        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/40 to-transparent p-4 flex flex-col justify-end">
          <h3 class="text-white text-lg font-semibold">Donut</h3>
          <p class="text-sm text-gray-300">April 11, 2025</p>
        </div>
      </div>

      <!-- Image 3 -->
      <div class="relative group rounded-lg overflow-hidden shadow-md cursor-pointer">
        <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/Is%20it%20in%20the%20dustbin.png" alt="3D Art 3" class="w-full h-full object-cover" />
        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/40 to-transparent p-4 flex flex-col justify-end">
          <h3 class="text-white text-lg font-semibold">Is it in the Dustbin?</h3>
          <p class="text-sm text-gray-300">April 12, 2025</p>
        </div>
      </div>

      <!-- Image 4 -->
      <div class="relative group rounded-lg overflow-hidden shadow-md cursor-pointer">
        <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/Peace.png" alt="3D Art 4" class="w-full h-full object-cover" />
        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/40 to-transparent p-4 flex flex-col justify-end">
          <h3 class="text-white text-lg font-semibold">Peace</h3>
          <p class="text-sm text-gray-300">April 13, 2025</p>
        </div>
      </div>

      <!-- Image 5 -->
      <div class="relative group rounded-lg overflow-hidden shadow-md cursor-pointer">
        <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/Still%20Wanna%20Be%20Yours.png" alt="3D Art 5" class="w-full h-full object-cover" />
        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/40 to-transparent p-4 flex flex-col justify-end">
          <h3 class="text-white text-lg font-semibold">Still Wanna Be Yours</h3>
          <p class="text-sm text-gray-300">April 14, 2025</p>
        </div>
      </div>

      <!-- Image 6 -->
      <div class="relative group rounded-lg overflow-hidden shadow-md cursor-pointer">
        <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/I%20Got%20You%20Angel.png" alt="3D Art 6" class="w-full h-full object-cover" />
        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/40 to-transparent p-4 flex flex-col justify-end">
          <h3 class="text-white text-lg font-semibold">I Got You Angel</h3>
          <p class="text-sm text-gray-300">April 15, 2025</p>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- Modal for fullscreen image -->
<div id="imgModal" class="modal" onclick="closeModal()">
  <img id="modalImg" src="" alt="Fullscreen Image" />
</div>

<!-- Footer -->
<footer class="text-center text-gray-500 py-6">
  &copy; 2025 JOKAPER. All rights reserved.
</footer>

<script>
  const modal = document.getElementById('imgModal');
  const modalImg = document.getElementById('modalImg');
  const body = document.body;

  document.querySelectorAll('#gallery img').forEach(img => {
    img.addEventListener('click', () => {
      modal.classList.add('open');
      modalImg.src = img.src;
      body.classList.add('blurred'); // Add blur effect to body when modal is open
    });
  });

  function closeModal() {
    modal.classList.remove('open');
    modalImg.src = '';
    body.classList.remove('blurred'); // Remove blur effect when modal is closed
  }
</script>

</body>
</html>
