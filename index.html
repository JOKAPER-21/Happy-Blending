<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Generalist Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
      z-index: 50;
    }
    .modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 1rem;
    }
    .modal.open {
      display: flex;
    }
  </style>
</head>
<body class="bg-gray-950 text-white font-sans">

  <!-- Hero Section -->
  <section id="hero" class="min-h-screen flex flex-col items-center justify-center text-center px-6">
    <h1 class="text-5xl font-bold mb-4">Hi, I'm a 3D Generalist</h1>
    <p class="text-lg max-w-xl">I create visually striking 3D environments, props, characters, and animations. Welcome to my portfolio.</p>
    <a href="#gallery" class="mt-6 inline-block bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-full text-white font-medium">View My Work</a>
  </section>

  <!-- Gallery Section -->
  <section id="gallery" class="py-20 bg-gray-900 px-6">
    <h2 class="text-4xl font-bold text-center mb-12">My Gallery</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/I%20Got%20You%20Angel.png
" class="rounded-lg shadow-md cursor-pointer" alt="3D Art 1">
      <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/I%20Got%20You%20Angel.png
" class="rounded-lg shadow-md cursor-pointer" alt="3D Art 2">
      <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/I%20Got%20You%20Angel.png
" class="rounded-lg shadow-md cursor-pointer" alt="3D Art 3">
      <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/I%20Got%20You%20Angel.png
" class="rounded-lg shadow-md cursor-pointer" alt="3D Art 4">
      <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/I%20Got%20You%20Angel.png
" class="rounded-lg shadow-md cursor-pointer" alt="3D Art 5">
      <img src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/image/I%20Got%20You%20Angel.png
" class="rounded-lg shadow-md cursor-pointer" alt="3D Art 6">
    </div>
  </section>

  <!-- Modal for fullscreen image -->
  <div id="imgModal" class="modal" onclick="closeModal()">
    <img id="modalImg" src="" alt="Fullscreen Image" />
  </div>

  <!-- Contact Section -->
  <section id="contact" class="py-20 px-6">
    <h2 class="text-4xl font-bold text-center mb-12">Contact</h2>
    <form class="max-w-xl mx-auto space-y-6">
      <input type="text" placeholder="Your Name" class="w-full p-4 rounded-lg bg-gray-800 border border-gray-700 text-white" required />
      <input type="email" placeholder="Your Email" class="w-full p-4 rounded-lg bg-gray-800 border border-gray-700 text-white" required />
      <textarea placeholder="Your Message" rows="5" class="w-full p-4 rounded-lg bg-gray-800 border border-gray-700 text-white" required></textarea>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-lg font-medium">Send Message</button>
    </form>
  </section>

  <!-- Footer -->
  <footer class="text-center text-gray-500 py-6">
    &copy; 2025 3D Generalist. All rights reserved.
  </footer>

  <script>
    const modal = document.getElementById('imgModal');
    const modalImg = document.getElementById('modalImg');
    document.querySelectorAll('#gallery img').forEach(img => {
      img.addEventListener('click', () => {
        modal.classList.add('open');
        modalImg.src = img.src;
      });
    });
    function closeModal() {
      modal.classList.remove('open');
      modalImg.src = '';
    }
  </script>

</body>
</html>
