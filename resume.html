<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOKAPER | Resume</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans">

  <!-- Navigation -->
  <nav class="bg-gray-900">
    <div class="mx-auto relative flex items-center justify-between p-6">
      
      <!-- Left: Logo -->
      <div>        
        <a href="index.html" class="text-3xl font-bold text-white hover:text-blue-500 transition">JOKAPER</a>
      </div>

      <!-- Center: Main Links -->
      <div class="absolute left-1/2 transform -translate-x-1/2 space-x-8 text-sm sm:text-base">
        <a href="index.html" class="text-gray-300 hover:text-white transition">HOME</a>
        <a href="personal.html" class="text-gray-300 hover:text-white transition">PORTFOLIO</a>
        <a href="resume.html" class="text-blue-500">RESUME</a>
      </div>

      <!-- Right: Contact -->
      <div>
        <a href="contact.html" class="inline-block border border-blue-600 text-blue-600 hover:bg-blue-600 hover:text-white px-6 py-2 rounded-full font-medium text-sm transition">CONTACT</a>
      </div>

    </div>
  </nav>

  <!-- Resume Section -->
  <section class="min-h-screen flex flex-col items-center justify-center text-center px-4 pt-1 pb-10">
    <div class="max-w-2xl mx-auto w-full">
      <h1 class="text-4xl font-bold mb-4">Resume</h1>
      <p class="text-lg text-gray-400 mb-6">View or download my resume to learn more about my background and experience.</p>
      
      <!-- 9:16 Embedded Resume Viewer -->
      <div class="border border-gray-700 rounded-md shadow-lg overflow-hidden mb-6 aspect-[9/16] w-full max-w-md mx-auto">
        <iframe src="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/src/pdf/Ananthan_Resume.pdf#toolbar=0" class="w-full h-full"></iframe>
      </div>

      <!-- Action Buttons -->
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a href="https://raw.githubusercontent.com/JOKAPER-21/Happy-Blending/main/src/PDF/Ananthan_Resume.pdf" target="_blank" class="bg-gray-800 hover:bg-gray-700 px-6 py-3 rounded-full text-white font-medium transition flex items-center justify-center">
          <i class="fas fa-expand mr-2"></i> Download
        </a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="text-center text-gray-500 py-6">
    &copy; 2025 JOKAPER. All rights reserved.
  </footer>

</body>
</html>
